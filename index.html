<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Predictor V3 - 专业量化仪表盘</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Chart.js 用于绘制走势图和统计图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- 侧边栏：状态与核心控制 -->
        <aside class="sidebar">
            <div class="brand">
                <h2>AI PREDICTOR <span class="version">V3 Pro</span></h2>
            </div>
            
            <!-- 倒计时模块 -->
            <div class="card timer-card">
                <h3>下一期开奖倒计时</h3>
                <div class="timer-display" id="countdown">30.0s</div>
                <div class="period-info">当前期号: <span id="current-period">20260716001</span></div>
                <div class="sync-status" id="sync-status">时间已与系统同步</div>
            </div>

            <!-- 核心数据统计 -->
            <div class="card stats-card">
                <h3>实时命中率统计</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">总期数</div>
                        <div class="stat-value" id="total-rounds">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">命中率</div>
                        <div class="stat-value highlight" id="win-rate">0.0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">当前连胜</div>
                        <div class="stat-value" id="current-streak">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最高连胜</div>
                        <div class="stat-value" id="max-streak">0</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主面板：预测与分析 -->
        <main class="main-content">
            <!-- 顶部预测看板 -->
            <section class="prediction-section">
                <div class="card prediction-card">
                    <div class="card-header">
                        <h3>🤖 AI 实时预测推荐</h3>
                        <div class="confidence-container">
                            AI 信心值: <span id="confidence-level">0%</span>
                            <div class="progress-bar"><div class="progress" id="confidence-bar"></div></div>
                        </div>
                    </div>
                    <div class="prediction-grid">
                        <div class="pred-box" id="pred-side">
                            <span class="pred-title">庄 / 闲</span>
                            <span class="pred-result">等待开奖</span>
                        </div>
                        <div class="pred-box" id="pred-size">
                            <span class="pred-title">大 / 小</span>
                            <span class="pred-result">等待开奖</span>
                        </div>
                        <div class="pred-box" id="pred-color">
                            <span class="pred-title">红 / 绿 / 紫</span>
                            <span class="pred-result">等待开奖</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 中部：数据分析与走势图 -->
            <section class="analysis-section">
                <!-- 综合策略评分 -->
                <div class="card matrix-card">
                    <h3>📊 AI 多维度策略矩阵评分</h3>
                    <div class="matrix-grid">
                        <div class="matrix-item"><span>热号追踪</span><span class="score" id="score-hot">--</span></div>
                        <div class="matrix-item"><span>冷号遗漏</span><span class="score" id="score-cold">--</span></div>
                        <div class="matrix-item"><span>邻号跳跃</span><span class="score" id="score-neighbor">--</span></div>
                        <div class="matrix-item"><span>跨度震荡</span><span class="score" id="score-span">--</span></div>
                        <div class="matrix-item"><span>单双奇偶</span><span class="score" id="score-oe">--</span></div>
                        <div class="matrix-item"><span>大小形态</span><span class="score" id="score-bs">--</span></div>
                    </div>
                </div>

                <!-- 走势图表 -->
                <div class="card chart-card">
                    <h3>📈 最近 20 期趋势波动图</h3>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- 底部：历史记录 -->
            <section class="history-section">
                <div class="card history-card">
                    <div class="card-header">
                        <h3>📝 最近 100 期开奖与预测历史</h3>
                        <button class="btn-clear" id="btn-clear-data">清空本地数据</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="history-table">
                            <thead>
                                <tr>
                                    <th>期号</th>
                                    <th>开奖号码</th>
                                    <th>形态 (庄闲/大小/颜色)</th>
                                    <th>AI 预测内容</th>
                                    <th>预测结果</th>
                                </tr>
                            </thead>
                            <tbody id="history-tbody">
                                <!-- 由 JavaScript 动态渲染 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 模块化脚本加载顺序 -->
    <script src="storage.js"></script>
    <script src="timer.js"></script>
    <script src="strategy.js"></script>
    <script src="predictor.js"></script>
    <script src="chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
